<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cerisé | Tienda Online</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="images/favicon3.png">
</head>

<body>
    <header class="topbar">
        <button class="menu-icon" onclick="abrirMenu()">☰</button>

        <div class="logo">
            <img src="images/logo1.png" alt="Cerise">
        </div>
        <button class="cart-icon" onclick="abrirCarrito()">🛒<span id="cart-dot" class="cart-dot">0</span></button>
    </header>

    <div class="menu" id="menu">
        <div class="menu-header">
            <button class="close-menu" onclick="cerrarTodo()">✕</button>
        </div>
        <ul>
            <li><a href="#productos" onclick="cerrarTodo()">Tienda</a></li>
            <li><a href="#" onclick="cerrarTodo()">Nuestra historia</a></li>
            <li><a href="https://www.instagram.com/uy.cerise" target="_blank" rel="noopener noreferrer" onclick="cerrarTodo()">Instagram</a></li>
        </ul>
    </div>

    <header class="hero">
        <div class="hero-content">
            <h1>Nueva colección<br>muy pronto</h1>
            <button onclick="scrollProductos()">VER TIENDA</button>
        </div>
    </header>

    <section class="historia">
        <h2>Nuestra historia</h2>
        <p>
            Piezas hechas a mano en Uruguay.<br>
            Diseños delicados creados con dedicación.
        </p>
    </section>

    <section id="productos">
        <h2>Colección</h2>
        <div class="grid" id="productos-container"></div>
    </section>

    <div id="overlay" class="overlay" onclick="cerrarTodo()"></div>

    <div class="cart" id="cart">
        <h2>Carrito</h2>
        <ul id="cart-items"></ul>
        <p class="total">Total: $<span id="total">0</span></p>
        <button class="continue" onclick="cerrarTodo()">Seguir comprando</button>
        <button class="vaciar" onclick="vaciarCarrito()">Vaciar carrito</button>
        <button class="checkout">Pagar</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
